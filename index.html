<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tenera — Customer Cockpit (prototype)</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280; --line:#e6e8ee;
    --accent:#2f6df6; --accent-soft:#eaf1ff;
    --hot:#e5484d; --warm:#f0883e; --luke:#e2b73a; --cold:#8b93a1;
    --green:#2fa96b; --purple:#8b5cf6; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .brand{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .brand b{font-size:15px}
  .brand .dot{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .filters{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px}
  .filters input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fbfcfe}
  .list{overflow:auto;flex:1;min-height:0}
  .row{display:flex;gap:11px;align-items:center;padding:11px 14px;border-bottom:1px solid #f1f3f7;cursor:pointer}
  .row:hover{background:#f8fafc}
  .row.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  .av{width:40px;height:40px;border-radius:50%;object-fit:cover;flex:none;background:#dfe3ea;display:grid;place-items:center;font-weight:700;color:#4b5566;font-size:14px}
  .row .meta{min-width:0;flex:1}
  .row .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .co{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .tags{display:flex;gap:5px;align-items:center;margin-top:3px}
  .chip{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:999px;background:#eef1f6;color:#4b5566;white-space:nowrap}
  .sdot{width:8px;height:8px;border-radius:50%}
  .filters select{border:1px solid var(--line);border-radius:8px;padding:7px 8px;font:inherit;background:#fbfcfe;font-size:12.5px}
  .fchk{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);white-space:nowrap}
  .score{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:auto}
  .sc-hi{background:#e7f6ee;color:#1f9d57} .sc-mid{background:#fbf3e3;color:#9a7b12} .sc-lo{background:#eef0f3;color:#6b7280}
  /* detail */
  .main{overflow:auto;min-height:0}
  .wrap{max-width:1320px;margin:0 auto;padding:24px 30px 80px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-top:16px}
  .col>.card:first-child{margin-top:0}
  @media(max-width:1020px){.cols{grid-template-columns:1fr}}
  .head{display:flex;gap:18px;align-items:flex-start}
  .photo{width:96px;height:96px;border-radius:16px;object-fit:cover;flex:none;background:#dfe3ea;display:grid;place-items:center;font-weight:700;color:#4b5566;font-size:30px;box-shadow:var(--shadow)}
  .h-main{flex:1;min-width:0}
  .h-main h1{margin:0 0 3px;font-size:22px}
  .h-sub{color:var(--muted);font-size:14px}
  .h-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:#eef1f6;color:#3a4251}
  .badge.stage{background:#fff2e6;color:#b4571a}
  .badge.hot{background:#fdeaea;color:var(--hot)} .badge.warm{background:#fdf0e6;color:var(--warm)}
  .badge.luke{background:#fbf5e3;color:#9a7b12} .badge.cold{background:#eef0f3;color:var(--cold)}
  .meta-line{margin-top:10px;color:var(--muted);font-size:13px;display:flex;flex-wrap:wrap;gap:14px}
  .meta-line a{color:var(--accent);text-decoration:none}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .card.memory{border-color:#d9e5ff;background:#fbfdff}
  .card.memory h3{color:var(--accent)}
  .exec b{font-weight:600}
  .exec .lbl{font-weight:700;margin:12px 0 4px}
  .exec ul{margin:4px 0 0;padding-left:18px}
  .exec li{margin:3px 0}
  .quote{color:#374151}
  /* --- demo outcome block --- */
  :root{--tg1:#3B6E11;--tg2:#587439}
  .demohead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid var(--line)}
  .demohead .dt{font-weight:700;font-size:15px}
  .demohead .dur{color:var(--muted);font-size:13px}
  .exec .stat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .s-completed{background:#e7f6ee;color:#1c7a4a}
  .s-scheduled{background:#e8effc;color:#2f5fb0}
  .s-rescheduled{background:#fdf3e2;color:#8a5a00}
  .s-cancelled{background:#f1eae9;color:#7a4b47}
  .s-declined{background:#f1eae9;color:#7a4b47}
  .s-noshow{background:#fdeaea;color:#b4322e}
  .exec .sent{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
  .exec .sent.hot{background:#fdeaea;color:var(--hot)} .exec .sent.warm{background:#fdf0e6;color:var(--warm)}
  .exec .sent.lukewarm{background:#fbf6e3;color:#8a6d00} .exec .sent.cold{background:#eef1f4;color:#6b7280}
  .ringwrap{display:flex;gap:18px;margin:12px 0;flex-wrap:wrap}
  .ringitem{display:flex;align-items:center;gap:10px}
  .ring{--p:0;width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--rc) calc(var(--p)*1%), #eef1f4 0);flex:0 0 auto}
  .ring>span{width:40px;height:40px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-weight:800;font-size:14px}
  .ringitem .rl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);line-height:1.3}
  .agree{background:#f7faf3;border-left:3px solid var(--tg1);border-radius:8px;padding:11px 14px;margin-top:4px}
  .chron{margin-top:2px}
  .chron .mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .chron .mrow:last-child{border-bottom:0}
  .chron .mt{font-weight:600}
  .chron .md{color:var(--muted);font-size:13px}
  .chron .st{margin-left:auto}
  .chron .mrow.past .mt,.chron .mrow.past .md{color:#9aa2af}
  .chron .moved{font-size:11px;color:#8a5a00;background:#fdf3e2;padding:1px 7px;border-radius:999px}
  .status{background:#fff8ec;border:1px solid #f3e3c0;border-radius:12px;padding:12px 14px;color:#6b5220;font-size:13.5px}
  .kv{display:flex;gap:10px;margin:6px 0}
  .kv .k{width:96px;color:var(--muted);flex:none;font-size:12.5px;padding-top:1px}
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed #eef0f4}
  .timeline li:last-child{border-bottom:0}
  .tl-ico{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-size:13px;background:#eef1f6}
  .tl-ico.email{background:#e9f0ff;color:#2f6df6} .tl-ico.meeting{background:#efe9ff;color:#7c3aed}
  .tl-ico.callna{background:#fdeaea;color:#e5484d} .tl-ico.callok{background:#e7f6ee;color:#1f9d57}
  .tl-ico.cx{background:#fdeaea;color:#e5484d} .tl-ico.moved{background:#fbf3e3;color:#9a7b12}
  .tl-body{flex:1;min-width:0}
  .tl-body .t{font-weight:600}
  .tl-body .d{color:var(--muted);font-size:12px}
  .tl-body .s{color:#4b5566;font-size:13px;margin-top:2px}
  .timeline li.tl-item{position:relative}
  .peek{font-size:11px;font-weight:600;color:#2f6df6;background:#eaf1ff;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;opacity:0;transition:.12s}
  .timeline li.tl-item:hover .peek{opacity:1}
  .tlprev{position:absolute;top:calc(100% - 4px);left:38px;right:8px;background:#1f2430;color:#fff;padding:11px 13px;border-radius:10px;font-size:12.5px;line-height:1.55;opacity:0;visibility:hidden;transform:translateY(4px);transition:.12s;z-index:40;box-shadow:0 10px 28px rgba(16,24,40,.32);max-height:230px;overflow:auto}
  .tlprev-h{font-weight:700;margin-bottom:5px;color:#cdd6ff}
  .tlprev-b{white-space:pre-wrap;color:#e7e9ee}
  .timeline li.tl-item:hover .tlprev{opacity:1;visibility:visible;transform:translateY(0)}
  .next{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .next .date{font-weight:700;color:var(--accent);white-space:nowrap}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  button{font:inherit;cursor:pointer;border-radius:9px;border:1px solid var(--line);background:#fff;padding:8px 12px;font-weight:600;color:var(--ink)}
  button:hover{background:#f6f8fb}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{filter:brightness(1.05)}
  button.ghost{background:transparent}
  .logbox{margin-top:12px;border:1px dashed var(--line);border-radius:12px;padding:14px;background:#fbfcfe;display:none}
  .logbox.open{display:block}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg label{padding:7px 12px;font-size:13px;cursor:pointer;background:#fff}
  .seg input{display:none}
  .seg input:checked + label{background:var(--accent);color:#fff}
  textarea,select,input.f{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font:inherit;background:#fff;margin-top:8px}
  textarea{min-height:90px;resize:vertical}
  .tasks{width:100%;border-collapse:collapse;font-size:13px}
  .tasks th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:6px 8px;border-bottom:1px solid var(--line)}
  .tasks td{padding:8px;border-bottom:1px solid #f1f3f7;vertical-align:middle}
  .tasks tr.done td{color:#9aa2af;text-decoration:line-through}
  .tstat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .tstat.plan{background:#eef1f6;color:#5b6472} .tstat.prog{background:#e9f0ff;color:#2f6df6} .tstat.done{background:#e7f6ee;color:#1f9d57}
  .addrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .addrow input,.addrow select{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font:inherit}
  .addrow input.grow{flex:1;min-width:160px}
  .muted{color:var(--muted)}
  .rsub{font-size:11px;color:var(--muted);margin-top:3px}
  .rsub .stale{color:#e5484d;font-weight:700} .rsub .warmw{color:#9a7b12;font-weight:700}
  .note{font-size:11.5px;color:var(--muted);margin-top:6px}
  .callbtn{display:inline-flex;align-items:center;gap:4px;margin-left:6px;padding:2px 9px;border-radius:7px;background:#5b5fc7;color:#fff;text-decoration:none;font-size:11.5px;font-weight:700}
  .callbtn:hover{filter:brightness(1.07)}
  .signals{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .sig{position:relative;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;background:#eef1f6;color:#4b5566;font-size:12px;font-weight:600;cursor:help}
  .sig.ok{background:#e7f6ee;color:#1f7a4d} .sig.warn{background:#fbf3e3;color:#8a6d12} .sig.bad{background:#fdeaea;color:#c23b3f} .sig.act{background:#e9f0ff;color:#2f6df6} .sig.neutral{background:#eef1f6;color:#4b5566}
  .sig .ic{font-size:13px}
  .sig .tip{position:absolute;bottom:calc(100% + 8px);left:0;width:270px;background:#1f2430;color:#fff;padding:10px 12px;border-radius:9px;font-size:12px;font-weight:500;line-height:1.5;opacity:0;visibility:hidden;transform:translateY(4px);transition:.12s;z-index:30;box-shadow:0 8px 24px rgba(16,24,40,.28)}
  .sig .tip b{color:#fff}
  .sig:hover .tip{opacity:1;visibility:visible;transform:translateY(0)}
  .sig .tip::after{content:'';position:absolute;top:100%;left:16px;border:6px solid transparent;border-top-color:#1f2430}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot">T</span><b>Tenera — Customer Cockpit</b><button onclick="showTasks()" style="margin-left:auto;padding:4px 10px;font-size:12px">✓ Tasks</button></div>
    <div class="filters"><input id="q" placeholder="Search customers…" oninput="renderList()"></div>
    <div class="filters" style="border-top:0;padding-top:0;gap:6px">
      <input id="ask" placeholder="Ask the CRM… e.g. the airport-inspections guy from my truck demo" onkeydown="if(event.key==='Enter')askCRM()" style="flex:1">
      <button onclick="askCRM()" style="padding:8px 12px;font-size:12px">Ask</button>
    </div>
    <div id="ask-out" style="display:none;margin:0 14px 10px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#f6faf2;font-size:13px;line-height:1.45;white-space:pre-wrap"></div>
    <div class="filters" style="border-top:0;padding-top:0;flex-wrap:wrap;gap:8px">
      <select id="f-sent" onchange="renderList()">
        <option value="">All heat</option><option>Hot</option><option>Warm</option><option>Lukewarm</option><option>Cold</option>
      </select>
      <label class="fchk"><input type="checkbox" id="f-lost" checked onchange="renderList()"> Hide lost</label>
      <label class="fchk"><input type="checkbox" id="f-eng" onchange="renderList()"> Hide engaged</label>
      <select id="f-sort" onchange="renderList()">
        <option value="priority">Sort: Priority</option>
        <option value="score">Sort: Score</option>
        <option value="value">Sort: Deal size</option>
        <option value="stale">Sort: Stalest first</option>
        <option value="recent">Sort: Recently touched</option>
        <option value="activity">Sort: Recent activity</option>
      </select>
    </div>
    <div class="filters" style="border-top:0;padding-top:0;flex-wrap:wrap;gap:8px">
      <label class="fchk" style="gap:6px"><input type="checkbox" id="f-demo" onchange="renderList()"> Demo between</label>
      <input type="date" id="f-demo-from" onchange="if(document.getElementById('f-demo').checked)renderList()" style="width:auto;font-size:12px;padding:6px 8px">
      <input type="date" id="f-demo-to" onchange="if(document.getElementById('f-demo').checked)renderList()" style="width:auto;font-size:12px;padding:6px 8px">
    </div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main"><div class="wrap" id="detail"></div></main>
</div>

const scoreClass = s => s>=75?'sc-hi':s>=50?'sc-mid':'sc-lo';
const SEAT = 49; // $/seat/mo (est) — configurable
const estMRR = c => (c.engineers||0)*SEAT;

function teamsLink(phone){ let d=String(phone||'').replace(/[^\d]/g,''); if(!d) return '#'; if(d.length===10) d='1'+d; return `https://teams.microsoft.com/l/call/0/0?users=4:+${d}`; }
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const MON={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const MONN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TODAY=new Date(); // real now
function parseD(s){
  if(!s||s==='today') return new Date();
  s=String(s).trim();
  const m=s.match(/(\d{1,2})[-\s]([A-Za-z]{3,9})\.?(?:[-\s](\d{2,4}))?/);
  if(m){ const mo=MON[m[2].slice(0,3).toLowerCase().replace(/^./,c=>c.toUpperCase())]; if(mo!=null){ const y=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):TODAY.getFullYear(); return new Date(y,mo,+m[1]); } }
  const d=new Date(s); return isNaN(d)?null:d;
}
function toDMY(iso){ if(!iso) return 'today'; const p=String(iso).split('-'); if(p.length<3) return iso; const d=new Date(+p[0],+p[1]-1,+p[2]); return isNaN(d)?iso:`${String(d.getDate()).padStart(2,'0')}-${MONN[d.getMonth()]}-${String(d.getFullYear()).slice(2)}`; }
function isTouch(m){ return !(m.type==='meeting'&&['cancelled','moved','noshow'].includes(m.status)); }
function touchStats(c){
  const past=c.comms.map(m=>({m,d:parseD(m.d)})).filter(x=>x.d && x.d<=TODAY && isTouch(x.m));
  const last=past.reduce((a,x)=>(!a||x.d>a.d)?x:a,null);
  const days=last?Math.round((TODAY-last.d)/86400000):null;
  return {n:past.length, lastDate:last?last.m.d:'—', days};
}
const staleCls = d => d>30?'stale':d>14?'warmw':'';
// A response = client actually engaged back: inbound email, connected call, or attended (past) meeting.
function isResp(m){ const d=parseD(m.d); if(!d||d>TODAY) return false; return (m.type==='meeting'&&(!m.status||m.status==='held'))||m.type==='callok'||(m.type==='email'&&m.dir==='in'); }
function respStats(c){
  const all=c.comms.map(m=>({m,d:parseD(m.d)})).filter(x=>x.d&&x.d<=TODAY&&isTouch(x.m));
  const resp=all.filter(x=>isResp(x.m));
  const last=resp.reduce((a,x)=>(!a||x.d>a.d)?x:a,null);
  const days=last?Math.round((TODAY-last.d)/86400000):null;
  const lastTouch=all.reduce((a,x)=>(!a||x.d>a.d)?x:a,null);
  const awaiting=lastTouch&&!isResp(lastTouch.m)&&(!last||lastTouch.d>last.d);
  return {lastDate:last?last.m.d:null, days, awaiting, awaitingDays:awaiting?Math.round((TODAY-lastTouch.d)/86400000):null};
}
function trialDaysLeft(c){ const e=parseD(c.trialEnds); return e?Math.round((e-TODAY)/86400000):null; }
function trialText(c){
  const td=trialDaysLeft(c);
  if(td==null) return 'No active trial';
  if(td<0) return `<span style="color:#e5484d;font-weight:600">Trial ended ${Math.abs(td)}d ago</span>`;
  return `Trial ends ${c.trialEnds} · <span style="color:${td<=7?'#e5484d':'#9a7b12'};font-weight:600">${td}d left</span>`;
}
// Blended priority for "who to call now": heat + deal size + urgency signals.
function priority(c){
  if(c.stage==='Closed Lost') return 0;
  let p={Hot:40,Warm:26,Lukewarm:14,Cold:4}[c.sentiment]||0;
  p += Math.min(28, c.reportsMonth||0);
  const r=respStats(c);
  if(r.awaiting && r.awaitingDays>=3) p+=10;
  if(r.days!=null && r.days>21) p+=8;
  const td=trialDaysLeft(c);
  if(td!=null && td>=0 && td<=7) p+=20;
  if(!c.nextMeeting) p+=6;
  return Math.min(100,Math.round(p));
}

function renderList(){
  const q=(document.getElementById('q').value||'').toLowerCase();

  const demoOn=document.getElementById('f-demo')&&document.getElementById('f-demo').checked;
  const dFrom=document.getElementById('f-demo-from')?document.getElementById('f-demo-from').value:'';
  const dTo=document.getElementById('f-demo-to')?document.getElementById('f-demo-to').value:'';
  const inDemoRange=c=>{ if(!demoOn) return true; const d=(c.demoDate||'').slice(0,10); if(!d) return false; return (!dFrom||d>=dFrom)&&(!dTo||d<=dTo); };
  const el=document.getElementById('list'); el.innerHTML='';
  customers
    .filter(c=>(!q||c.name.toLowerCase().includes(q)||c.company.toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q))
      && (!sent||c.sentiment===sent)
      && (!hideLost||c.stage!=='Closed Lost')
      && (!hideEng||!c.engaged)
      && (sortMode!=='activity'||!!c.activityDate)
      && inDemoRange(c))
    .sort((a,b)=>{
      const sm=sortMode;
      if(sm==='priority') return priority(b)-priority(a);
      if(sm==='value')  return estMRR(b)-estMRR(a);
      if(sm==='stale')  return (touchStats(b).days??1e9)-(touchStats(a).days??1e9);
      if(sm==='recent') return (touchStats(a).days??1e9)-(touchStats(b).days??1e9);
      if(sm==='activity') return (b.activityDate||'').localeCompare(a.activityDate||'');
      return b.score-a.score;
    })
    .forEach(c=>{
    const d=document.createElement('div');
    d.className='row'+(c.id===currentId?' active':'');
    d.onclick=()=>openCustomer(c.id);
    const ts=touchStats(c); const rs=respStats(c);
    const subline = sortMode==='activity'
      ? `⚡ ${esc(c.lastActivity||'—')}`

    d.innerHTML=`${avatarHTML(c,'av')}
      <div class="meta">
        <div class="nm">${esc(c.name)}</div>
        <div class="co">${esc(c.company)}</div>
        <div class="tags"><span class="sdot" style="background:var(${SENT[c.sentiment]})"></span>

          <span class="score ${scoreClass(c.score)}">${c.score}</span></div>
        <div class="rsub">${subline}</div>

    el.appendChild(d);
  });
}

   <div class="kv"><div class="k">Last response</div><div>${(()=>{const r=respStats(c);if(!r.lastDate)return '<span style="color:#e5484d;font-weight:600">No response yet</span>';let s=`${r.lastDate} (${r.days===0?'today':r.days+'d ago'})`;if(r.awaiting)s+=` · <span style="color:#e5484d;font-weight:600">awaiting reply ${r.awaitingDays}d</span>`;return s;})()}</div></div>
   <div class="kv"><div class="k">Last call</div><div>${esc(lastCallText(c))}</div></div>
   <div class="kv"><div class="k">Emails sent</div><ul style="margin:0;padding-left:16px">${emailsSentList(c)}</ul></div>`;
}
// Derive the 8-signal bar from live data when explicit c.sig isn't provided.
function computeSignals(c){
  if(c.sig && c.sig.length) return c.sig;
  const out=[]; const r=respStats(c); const t=touchStats(c); const td=trialDaysLeft(c);
  const lost=(c.stage==='Closed Lost');
  // Next best action (heuristic) — first chip
  let nba;
  if(lost) nba='No action — deal closed lost; revisit later.';
  else if(td!=null && td>=0 && td<=7) nba='Trial ends in '+td+'d — book a build session now.';
  else if(r.awaiting) nba='Awaiting reply '+r.awaitingDays+'d — call instead of emailing again.';
  else if(!c.nextMeeting) nba='No meeting booked — propose a next session.';
  else nba='Prep the '+c.nextMeeting+' meeting.';
  out.push(['🎯', lost?'Hold':'Next', 'act', '<b>Next best action:</b> '+esc(nba)]);
  // Ball in court
  if(lost) out.push(['⚖️','Closed','neutral','<b>Ball in court:</b> Closed Lost.']);
  else if(r.awaiting) out.push(['⚖️','Them · '+r.awaitingDays+'d', r.awaitingDays>7?'bad':'warn', '<b>Ball in court:</b> Them — awaiting a reply for '+r.awaitingDays+'d since your last outreach.']);
  else if(r.lastDate) out.push(['⚖️','You'+(r.days!=null?' · '+r.days+'d':''), r.days>14?'bad':'warn', '<b>Ball in court:</b> You — they last engaged '+r.days+'d ago; your move.']);
  else out.push(['⚖️','You','warn','<b>Ball in court:</b> You — no response logged yet.']);
  // Engagement (last real response)
  if(r.lastDate) out.push(['📨','Replied '+r.days+'d', r.days>21?'bad':r.days>10?'warn':'ok', '<b>Engagement:</b> Last real response (reply / connected call / attended meeting) on '+r.lastDate+' ('+r.days+'d ago).']);
  else out.push(['📨','No reply','bad','<b>Engagement:</b> No inbound reply, connected call, or attended meeting logged yet.']);
  // Trial / volume
  if(td!=null) out.push(['📈', td<0?'Trial ended':'Trial '+td+'d', (td<0||td<=7)?'bad':'warn', '<b>Trial:</b> '+trialText(c).replace(/<[^>]+>/g,'')]);
  else if(c.reportsMonth) out.push(['📈','~'+c.reportsMonth+'/mo','ok','<b>Volume:</b> ~'+c.reportsMonth+' reports/month'+(c.engineers?(' · '+c.engineers+' engineers'):'')+'.']);
  // Deal size
  if(c.engineers) out.push(['🧭', fmtMRR(c).replace('~',''), 'neutral', '<b>Deal size:</b> '+c.engineers+' engineers · ~'+(c.reportsMonth||'?')+' reports/mo · '+fmtMRR(c)+'.']);
  // Blocker
  if(c.blocker) out.push(['⚔️','Blocker','warn','<b>Blocker:</b> '+esc(c.blocker)]);
  // Nurture
  out.push(['💬', t.n+' touches', (t.days!=null&&t.days>21?'warn':'neutral'), '<b>Nurture:</b> '+t.n+' touches · last touch '+t.lastDate+(t.days!=null?' ('+t.days+'d ago)':'')+'.']);
  return out;
}
function signalsHTML(c){
  const sig=computeSignals(c);
  if(!sig||!sig.length) return '';
  return `<div class="signals">`+sig.map(s=>`<span class="sig ${s[2]||'neutral'}"><span class="ic">${s[0]}</span><span>${esc(s[1])}</span><span class="tip">${s[3]}</span></span>`).join('')+`</div>`;
}

/* ---- interactions (in-memory) ---- */
function apiPost(url,body){ try{ fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }catch(e){} }
function mdBold(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>'); }
function fuCardHTML(v,isEmail){
  const label=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);margin-bottom:5px">${esc(v.label||'Option')}</div>`;
  const subj=(isEmail&&v.subject)?`<div style="font-weight:600;margin-bottom:4px">Subject: ${esc(v.subject)}</div>`:'';
  const copyText=(isEmail?((v.subject?('Subject: '+v.subject+'\n\n'):'')+ (v.body||'')):(v.body||''));
  const copyBtn=`<button onclick='fuCopy(this)' data-copy="${encodeURIComponent(copyText)}" style="font-size:11px;padding:3px 9px;margin-top:6px">Copy</button>`;
  return `<div style="border:1px solid var(--line);border-radius:9px;padding:11px 13px;background:#fbfcfe">${label}${subj}<div style="font-size:13.5px;line-height:1.5">${mdBold(v.body||'')}</div>${copyBtn}</div>`;
}
function fuCopy(btn){ try{ const t=decodeURIComponent(btn.getAttribute('data-copy')); navigator.clipboard.writeText(t); btn.textContent='Copied'; setTimeout(()=>btn.textContent='Copy',1200);}catch(e){} }
async function proposeFollowup(id){
  const c=customers.find(x=>x.id===id); if(!c) return;
  const out=document.getElementById('fu-out-'+id), btn=document.getElementById('fu-btn-'+id);
  if(btn){ btn.disabled=true; btn.textContent='Drafting…'; }
  out.innerHTML='<span class="muted" style="font-size:13px">Claude is reading the transcript, emails & quotes…</span>';
  try{
    const r=await fetch('/api/followup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contactId:c.contactId||c.id,email:c.email||'',name:c.name||''})});
    const d=await r.json();
    if(!d||!d.ok){ out.innerHTML='<span class="stale" style="font-size:13px">⚠ '+esc((d&&d.error)||'No draft returned')+'</span>'; }
    else {
      const call=(d.call||[]).map(v=>fuCardHTML(v,false)).join('');
      const email=(d.email||[]).map(v=>fuCardHTML(v,true)).join('');
      out.innerHTML=
        `<div class="lbl" style="font-weight:700;margin:2px 0 6px">📞 On the call — A/B</div><div style="display:grid;gap:8px">${call||'<span class="muted">—</span>'}</div>`+
        `<div class="lbl" style="font-weight:700;margin:14px 0 6px">✉ Email — A/B</div><div style="display:grid;gap:8px">${email||'<span class="muted">—</span>'}</div>`;
    }
  }catch(e){ out.innerHTML='<span class="stale" style="font-size:13px">⚠ '+esc(e.message||e)+'</span>'; }
  if(btn){ btn.disabled=false; btn.textContent='✨ Propose follow-up'; }
}
async function askCRM(){
  const inp=document.getElementById('ask'); const out=document.getElementById('ask-out');
  const q=(inp.value||'').trim(); if(!q) return;
  out.style.display='block'; out.textContent='Thinking…';
  try{
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    const d=await r.json();
    out.textContent = d && d.answer ? d.answer : (d && d.error ? ('⚠ '+d.error) : 'No answer.');
  }catch(e){ out.textContent='⚠ '+ (e && e.message || e); }
}
function toggleLog(){document.getElementById('logbox').classList.toggle('open');}
function toggleEmail(){document.getElementById('emailbox').classList.toggle('open');}
function saveEmail(){
  const c=customers.find(x=>x.id===currentId);
  const s=document.getElementById('em-subj').value.trim()||'(email)';
  const body=(document.getElementById('em-body').value||'').trim();
  const iso=document.getElementById('em-date').value||new Date().toISOString().slice(0,10);
  const d=toDMY(iso);
  c.comms.unshift({type:'email',t:s,d:d,dir:'out',s:body});
  apiPost('/api/log',{id:c.id,contactId:c.contactId,kind:'email',subject:s,body:body,date:iso});
  renderDetail();
}
function onCallType(){document.getElementById('tr-wrap').style.display=document.getElementById('ct-ok').checked?'block':'none';}
function saveCall(){
  const c=customers.find(x=>x.id===currentId);
  const ok=document.getElementById('ct-ok').checked;
  const iso=document.getElementById('call-date').value||new Date().toISOString().slice(0,10);
  const date=toDMY(iso);
  if(ok){
    const tr=document.getElementById('call-tr').value.trim();
    c.comms.unshift({type:'callok',t:'Connected call'+(tr?' — transcript captured':''),d:date,s:tr?tr.slice(0,180)+(tr.length>180?'…':''):''});
  }else{
    c.comms.unshift({type:'callna',t:'Called — no answer',d:date});
  }
  apiPost('/api/log',{id:c.id,contactId:c.contactId,kind:'call',outcome:ok?'connected':'noanswer',date:iso,transcript:ok?(document.getElementById('call-tr').value||''):''});
  renderDetail();
}
function planTouch(kind){
  const c=customers.find(x=>x.id===currentId);
  const when=prompt(`Plan a ${kind} — due date (e.g. 15-Jul)?`,''); if(when===null)return;
  c.tasks.push({t:`${kind} — planned outreach`,type:kind,due:when||'TBD',st:'plan'});
  renderDetail();
}
async function addTask(id){
  const c=customers.find(x=>x.id===id);
  const t=document.getElementById('nt-'+id).value.trim(); if(!t)return;
  const type=document.getElementById('ntype-'+id).value, iso=document.getElementById('ndue-'+id).value;
  const due=iso?toDMY(iso):'TBD';
  const task={t,type,due,iso,st:'plan'};
  c.tasks.push(task);
  renderDetail();
  try{ const r=await fetch('/api/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id, contactId:c.contactId, task:t, type, due:iso||''})}); const j=await r.json(); if(j&&j.id) task.taskId=j.id; }catch(e){}
}
function toggleTask(id,i){const c=customers.find(x=>x.id===id);const t=c.tasks[i];t.st=t.st==='done'?'plan':'done';if(t.taskId)apiPost('/api/task',{taskId:t.taskId,status:t.st==='done'?'Done':'Planned'});renderDetail();}
function setOwner(id,val){const c=customers.find(x=>x.id===id);c.owner=val;apiPost('/api/update',{id,contactId:c.contactId,field:'owner',value:val});renderList();renderDetail();}
function setEngaged(id,val){const c=customers.find(x=>x.id===id);c.engaged=val;apiPost('/api/update',{id:c.profileId||c.id,contactId:c.contactId,field:'engaged',value:val});renderList();renderDetail();}
function saveNote(id){const c=customers.find(x=>x.id===id);const v=document.getElementById('mynote-'+id).value;if(v===(c.myNote||''))return;c.myNote=v;apiPost('/api/update',{id:c.profileId||c.id,contactId:c.contactId,field:'note',value:v});}

/* ---- Tasks view (all contacts) ---- */
let view='detail', taskFilter='all', taskCallsOnly=false, taskHideDone=true;
function openCustomer(id){currentId=id;view='detail';renderList();renderDetail();}
function showCustomers(){view='detail';renderDetail();}
function showTasks(){view='tasks';renderTasks();}
function setTaskFilter(k){taskFilter=k;renderTasks();}
function allTasks(){const out=[];customers.forEach(c=>{(c.tasks||[]).forEach((t,i)=>out.push(Object.assign({},t,{cid:c.id,cust:c.name,company:c.company,idx:i})));});return out;}
function taskDue(t){return parseD(t.iso||t.due);}
function taskDiff(t){const d=taskDue(t);if(!d)return null;const a=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());const b=new Date(d.getFullYear(),d.getMonth(),d.getDate());return Math.round((b-a)/86400000);}
function taskInRange(t){const diff=taskDiff(t);if(taskFilter==='all')return true;if(diff==null)return false;if(taskFilter==='past')return diff<0;if(taskFilter==='today')return diff===0;if(taskFilter==='tomorrow')return diff===1;if(taskFilter==='week')return diff>=0&&diff<=7;return true;}
function toggleTaskById(cid,taskId,i){const c=customers.find(x=>x.id===cid);const t=c&&c.tasks[i];if(!t)return;t.st=t.st==='done'?'plan':'done';if(taskId)apiPost('/api/task',{taskId,status:t.st==='done'?'Done':'Planned'});renderTasks();}
function renderTasks(){
  const rows=allTasks().filter(t=>(!taskHideDone||t.st!=='done')).filter(t=>(!taskCallsOnly||t.type==='Call')).filter(taskInRange)
    .sort((a,b)=>{const da=taskDue(a),db=taskDue(b);return (da?da.getTime():9e15)-(db?db.getTime():9e15);});
  const fbtn=(k,l)=>`<button class="${taskFilter===k?'primary':''}" onclick="setTaskFilter('${k}')">${l}</button>`;
  const body=rows.map(t=>{const diff=taskDiff(t);const overdue=diff!=null&&diff<0&&t.st!=='done';
    return `<tr onclick="openCustomer('${t.cid}')" style="cursor:pointer">
      <td><input type="checkbox" ${t.st==='done'?'checked':''} onclick="event.stopPropagation();toggleTaskById('${t.cid}','${t.taskId||''}',${t.idx})"></td>
      <td>${esc(t.t)}</td>
      <td>${esc(t.cust)}${t.company?` · <span class="muted">${esc(t.company)}</span>`:''}</td>
      <td><span class="chip">${esc(t.type)}</span></td>
      <td${overdue?' style="color:#e5484d;font-weight:600"':''}>${esc(t.due||'—')}</td>
      <td><span class="tstat ${t.st}">${({plan:'Planned',prog:'In progress',done:'Done'})[t.st]||t.st}</span></td>
    </tr>`;}).join('');
  document.getElementById('detail').innerHTML=`
    <div class="head" style="align-items:center;gap:14px">
      <h1 style="margin:0;flex:1">✓ Sales tasks</h1>
      <button onclick="showCustomers()">← Back to customers</button>
    </div>
    <div class="card">
      <div class="btns" style="margin-bottom:12px;align-items:center">
        ${fbtn('all','All')}${fbtn('past','Past due')}${fbtn('today','Today')}${fbtn('tomorrow','Tomorrow')}${fbtn('week','Next 7 days')}
        <label class="fchk" style="margin-left:8px"><input type="checkbox" ${taskCallsOnly?'checked':''} onchange="taskCallsOnly=this.checked;renderTasks()"> Calls only</label>
        <label class="fchk"><input type="checkbox" ${taskHideDone?'checked':''} onchange="taskHideDone=this.checked;renderTasks()"> Hide done</label>
      </div>
      <table class="tasks"><thead><tr><th></th><th>Task</th><th>Customer</th><th>Type</th><th>Due</th><th>Status</th></tr></thead>
      <tbody>${body||'<tr><td colspan="6" class="muted">No tasks match this filter.</td></tr>'}</tbody></table>
    </div>`;
}

renderList();renderDetail();
// Live data (Vercel): pull from the Notion-backed API; falls back to the sample above if unavailable.
fetch('/api/customers').then(r=>r.ok?r.json():null).then(d=>{
  const arr=d&&(d.customers||d);
  if(Array.isArray(arr)&&arr.length){ customers=arr; if(!customers.find(x=>x.id===currentId)) currentId=customers[0].id; renderList(); (view==='tasks'?renderTasks():renderDetail()); }
}).catch(()=>{});
</script>
