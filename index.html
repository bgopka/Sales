<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tenera — Customer Cockpit (prototype)</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280; --line:#e6e8ee;
    --accent:#2f6df6; --accent-soft:#eaf1ff;
    --hot:#e5484d; --warm:#f0883e; --luke:#e2b73a; --cold:#8b93a1;
    --green:#2fa96b; --purple:#8b5cf6; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh}
  /* sidebar */
  .side{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .brand{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .brand b{font-size:15px}
  .brand .dot{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .filters{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px}
  .filters input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fbfcfe}
  .list{overflow:auto;flex:1;min-height:0}
  .row{display:flex;gap:11px;align-items:center;padding:11px 14px;border-bottom:1px solid #f1f3f7;cursor:pointer}
  .row:hover{background:#f8fafc}
  .row.active{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
  .av{width:40px;height:40px;border-radius:50%;object-fit:cover;flex:none;background:#dfe3ea;display:grid;place-items:center;font-weight:700;color:#4b5566;font-size:14px}
  .row .meta{min-width:0;flex:1}
  .row .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .co{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .tags{display:flex;gap:5px;align-items:center;margin-top:3px}
  .chip{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:999px;background:#eef1f6;color:#4b5566;white-space:nowrap}
  .sdot{width:8px;height:8px;border-radius:50%}
  .filters select{border:1px solid var(--line);border-radius:8px;padding:7px 8px;font:inherit;background:#fbfcfe;font-size:12.5px}
  .fchk{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);white-space:nowrap}
  .score{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:auto}
  .sc-hi{background:#e7f6ee;color:#1f9d57} .sc-mid{background:#fbf3e3;color:#9a7b12} .sc-lo{background:#eef0f3;color:#6b7280}
  /* detail */
  .main{overflow:auto;min-height:0}
  .wrap{max-width:1320px;margin:0 auto;padding:24px 30px 80px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-top:16px}
  .col>.card:first-child{margin-top:0}
  @media(max-width:1020px){.cols{grid-template-columns:1fr}}
  .head{display:flex;gap:18px;align-items:flex-start}
  .photo{width:96px;height:96px;border-radius:16px;object-fit:cover;flex:none;background:#dfe3ea;display:grid;place-items:center;font-weight:700;color:#4b5566;font-size:30px;box-shadow:var(--shadow)}
  .h-main{flex:1;min-width:0}
  .h-main h1{margin:0 0 3px;font-size:22px}
  .h-sub{color:var(--muted);font-size:14px}
  .h-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:#eef1f6;color:#3a4251}
  .badge.stage{background:#fff2e6;color:#b4571a}
  .badge.hot{background:#fdeaea;color:var(--hot)} .badge.warm{background:#fdf0e6;color:var(--warm)}
  .badge.luke{background:#fbf5e3;color:#9a7b12} .badge.cold{background:#eef0f3;color:var(--cold)}
  .meta-line{margin-top:10px;color:var(--muted);font-size:13px;display:flex;flex-wrap:wrap;gap:14px}
  .meta-line a{color:var(--accent);text-decoration:none}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .card.memory{border-color:#d9e5ff;background:#fbfdff}
  .card.memory h3{color:var(--accent)}
  .exec b{font-weight:600}
  .exec .lbl{font-weight:700;margin:12px 0 4px}
  .exec ul{margin:4px 0 0;padding-left:18px}
  .exec li{margin:3px 0}
  .quote{color:#374151}
  .status{background:#fff8ec;border:1px solid #f3e3c0;border-radius:12px;padding:12px 14px;color:#6b5220;font-size:13.5px}
  .kv{display:flex;gap:10px;margin:6px 0}
  .kv .k{width:96px;color:var(--muted);flex:none;font-size:12.5px;padding-top:1px}
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed #eef0f4}
  .timeline li:last-child{border-bottom:0}
  .tl-ico{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-size:13px;background:#eef1f6}
  .tl-ico.email{background:#e9f0ff;color:#2f6df6} .tl-ico.meeting{background:#efe9ff;color:#7c3aed}
  .tl-ico.callna{background:#fdeaea;color:#e5484d} .tl-ico.callok{background:#e7f6ee;color:#1f9d57}
  .tl-ico.cx{background:#fdeaea;color:#e5484d} .tl-ico.moved{background:#fbf3e3;color:#9a7b12}
  .tl-body{flex:1;min-width:0}
  .tl-body .t{font-weight:600}
  .tl-body .d{color:var(--muted);font-size:12px}
  .tl-body .s{color:#4b5566;font-size:13px;margin-top:2px}
  .timeline li.tl-item{position:relative}
  .peek{font-size:11px;font-weight:600;color:#2f6df6;background:#eaf1ff;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;opacity:0;transition:.12s}
  .timeline li.tl-item:hover .peek{opacity:1}
  .tlprev{position:absolute;top:calc(100% - 4px);left:38px;right:8px;background:#1f2430;color:#fff;padding:11px 13px;border-radius:10px;font-size:12.5px;line-height:1.55;opacity:0;visibility:hidden;transform:translateY(4px);transition:.12s;z-index:40;box-shadow:0 10px 28px rgba(16,24,40,.32);max-height:230px;overflow:auto}
  .tlprev-h{font-weight:700;margin-bottom:5px;color:#cdd6ff}
  .tlprev-b{white-space:pre-wrap;color:#e7e9ee}
  .timeline li.tl-item:hover .tlprev{opacity:1;visibility:visible;transform:translateY(0)}
  .next{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
  .next .date{font-weight:700;color:var(--accent);white-space:nowrap}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  button{font:inherit;cursor:pointer;border-radius:9px;border:1px solid var(--line);background:#fff;padding:8px 12px;font-weight:600;color:var(--ink)}
  button:hover{background:#f6f8fb}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{filter:brightness(1.05)}
  button.ghost{background:transparent}
  .logbox{margin-top:12px;border:1px dashed var(--line);border-radius:12px;padding:14px;background:#fbfcfe;display:none}
  .logbox.open{display:block}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg label{padding:7px 12px;font-size:13px;cursor:pointer;background:#fff}
  .seg input{display:none}
  .seg input:checked + label{background:var(--accent);color:#fff}
  textarea,select,input.f{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font:inherit;background:#fff;margin-top:8px}
  textarea{min-height:90px;resize:vertical}
  .tasks{width:100%;border-collapse:collapse;font-size:13px}
  .tasks th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:6px 8px;border-bottom:1px solid var(--line)}
  .tasks td{padding:8px;border-bottom:1px solid #f1f3f7;vertical-align:middle}
  .tasks tr.done td{color:#9aa2af;text-decoration:line-through}
  .tstat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .tstat.plan{background:#eef1f6;color:#5b6472} .tstat.prog{background:#e9f0ff;color:#2f6df6} .tstat.done{background:#e7f6ee;color:#1f9d57}
  .addrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .addrow input,.addrow select{border:1px solid var(--line);border-radius:8px;padding:8px 9px;font:inherit}
  .addrow input.grow{flex:1;min-width:160px}
  .muted{color:var(--muted)}
  .rsub{font-size:11px;color:var(--muted);margin-top:3px}
  .rsub .stale{color:#e5484d;font-weight:700} .rsub .warmw{color:#9a7b12;font-weight:700}
  .note{font-size:11.5px;color:var(--muted);margin-top:6px}
  .callbtn{display:inline-flex;align-items:center;gap:4px;margin-left:6px;padding:2px 9px;border-radius:7px;background:#5b5fc7;color:#fff;text-decoration:none;font-size:11.5px;font-weight:700}
  .callbtn:hover{filter:brightness(1.07)}
  .signals{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .sig{position:relative;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;background:#eef1f6;color:#4b5566;font-size:12px;font-weight:600;cursor:help}
  .sig.ok{background:#e7f6ee;color:#1f7a4d} .sig.warn{background:#fbf3e3;color:#8a6d12} .sig.bad{background:#fdeaea;color:#c23b3f} .sig.act{background:#e9f0ff;color:#2f6df6} .sig.neutral{background:#eef1f6;color:#4b5566}
  .sig .ic{font-size:13px}
  .sig .tip{position:absolute;bottom:calc(100% + 8px);left:0;width:270px;background:#1f2430;color:#fff;padding:10px 12px;border-radius:9px;font-size:12px;font-weight:500;line-height:1.5;opacity:0;visibility:hidden;transform:translateY(4px);transition:.12s;z-index:30;box-shadow:0 8px 24px rgba(16,24,40,.28)}
  .sig .tip b{color:#fff}
  .sig:hover .tip{opacity:1;visibility:visible;transform:translateY(0)}
  .sig .tip::after{content:'';position:absolute;top:100%;left:16px;border:6px solid transparent;border-top-color:#1f2430}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot">T</span><b>Tenera — Customer Cockpit</b></div>
    <div class="filters"><input id="q" placeholder="Search customers…" oninput="renderList()"></div>
    <div class="filters" style="border-top:0;padding-top:0;flex-wrap:wrap;gap:8px">
      <select id="f-sent" onchange="renderList()">
        <option value="">All heat</option><option>Hot</option><option>Warm</option><option>Lukewarm</option><option>Cold</option>
      </select>
      <label class="fchk"><input type="checkbox" id="f-lost" checked onchange="renderList()"> Hide lost</label>
      <label class="fchk"><input type="checkbox" id="f-eng" onchange="renderList()"> Hide engaged</label>
      <select id="f-sort" onchange="renderList()">
        <option value="priority">Sort: Priority</option>
        <option value="score">Sort: Score</option>
        <option value="value">Sort: Deal size</option>
        <option value="stale">Sort: Stalest first</option>
        <option value="recent">Sort: Recently touched</option>
      </select>
    </div>
    <div class="list" id="list"></div>
  </aside>
  <main class="main"><div class="wrap" id="detail"></div></main>
</div>
<script>
</script>
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot">T</span><b>Tenera — Customer Cockpit</b></div>
</script>
</body>
</html>
